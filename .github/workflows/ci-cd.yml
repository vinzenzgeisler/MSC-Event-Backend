name: Backend CI/CD

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
      - "feature/**"
      - "fix/**"
      - "chore/**"
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      dev_profile:
        description: "Dev deploy profile"
        required: true
        default: "test"
        type: choice
        options:
          - idle
          - test
      deploy_shared_dev:
        description: "Deploy the selected branch to the shared dev backend infrastructure"
        required: true
        default: true
        type: boolean

permissions:
  id-token: write
  contents: read

concurrency:
  group: backend-${{ github.ref == 'refs/heads/main' && 'prod' || 'shared-dev' }}
  cancel-in-progress: false

jobs:
  validate_common:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'schedule' && 'refs/heads/dev' || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: API tests
        run: npm --workspace api test

      - name: Infra build
        run: npm --workspace infra run build

  validate_dev:
    if: github.base_ref == 'dev' || startsWith(github.ref, 'refs/heads/dev') || startsWith(github.ref, 'refs/heads/feature/') || startsWith(github.ref, 'refs/heads/fix/') || startsWith(github.ref, 'refs/heads/chore/') || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    needs: validate_common
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'schedule' && 'refs/heads/dev' || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate Dev environment configuration
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}" ]; then
            echo "AWS_DEPLOY_ROLE_ARN_DEV is missing in GitHub Environment 'dev'."
            exit 1
          fi
          if [ -z "${{ vars.AWS_ACCOUNT_ID }}" ]; then
            echo "AWS_ACCOUNT_ID is missing in GitHub Environment 'dev'."
            exit 1
          fi
          if [ -z "${{ vars.AWS_REGION }}" ]; then
            echo "AWS_REGION is missing in GitHub Environment 'dev'."
            exit 1
          fi
          if [ -z "${{ vars.DEV_PUBLIC_BASE_URL }}" ]; then
            echo "DEV_PUBLIC_BASE_URL is missing in GitHub Environment 'dev'."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: CDK synth (dev)
        run: npm --workspace infra run synth -- -c stage=dev -c devProfile=test
        env:
          DEV_PUBLIC_BASE_URL: ${{ vars.DEV_PUBLIC_BASE_URL }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

  validate_prod:
    if: |
      (github.event_name == 'pull_request' && github.base_ref == 'main') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: validate_common
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate Prod environment configuration
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}" ]; then
            echo "AWS_DEPLOY_ROLE_ARN_PROD is missing in GitHub Environment 'prod'."
            exit 1
          fi
          if [ -z "${{ vars.AWS_ACCOUNT_ID }}" ]; then
            echo "AWS_ACCOUNT_ID is missing in GitHub Environment 'prod'."
            exit 1
          fi
          if [ -z "${{ vars.AWS_REGION }}" ]; then
            echo "AWS_REGION is missing in GitHub Environment 'prod'."
            exit 1
          fi
          if [ -z "${{ vars.PROD_PUBLIC_BASE_URL }}" ]; then
            echo "PROD_PUBLIC_BASE_URL is missing in GitHub Environment 'prod'."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: CDK synth (prod)
        run: npm --workspace infra run synth -- -c stage=prod
        env:
          PROD_PUBLIC_BASE_URL: ${{ vars.PROD_PUBLIC_BASE_URL }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

  deploy_dev:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/feature/')) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/fix/')) ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/heads/chore/')) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_shared_dev == true) ||
      (github.event_name == 'schedule')
    needs:
      - validate_dev
    runs-on: ubuntu-latest
    environment: dev
    env:
      DEV_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dev_profile || github.event_name == 'schedule' && 'idle' || 'test' }}
      STACK_PREFIX: dreiecksrennen-dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'schedule' && 'refs/heads/dev' || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate Dev environment configuration
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}" ]; then
            echo "AWS_DEPLOY_ROLE_ARN_DEV is missing in GitHub Environment 'dev'."
            exit 1
          fi
          if [ -z "${{ vars.AWS_ACCOUNT_ID }}" ]; then
            echo "AWS_ACCOUNT_ID is missing in GitHub Environment 'dev'."
            exit 1
          fi
          if [ -z "${{ vars.AWS_REGION }}" ]; then
            echo "AWS_REGION is missing in GitHub Environment 'dev'."
            exit 1
          fi
          if [ -z "${{ vars.DEV_PUBLIC_BASE_URL }}" ]; then
            echo "DEV_PUBLIC_BASE_URL is missing in GitHub Environment 'dev'."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Stop Dev database for idle profile
        if: env.DEV_PROFILE == 'idle'
        run: |
          set -euo pipefail
          DB_ID="${STACK_PREFIX}-postgres-public"
          status="$(aws rds describe-db-instances --db-instance-identifier "${DB_ID}" --region "${AWS_REGION}" --query "DBInstances[0].DBInstanceStatus" --output text 2>/dev/null || true)"
          if [ -z "${status}" ]; then
            echo "${DB_ID} does not exist; skipping stop."
          elif [ "${status}" = "available" ]; then
            aws rds stop-db-instance --db-instance-identifier "${DB_ID}" --region "${AWS_REGION}"
            aws rds wait db-instance-stopped --db-instance-identifier "${DB_ID}" --region "${AWS_REGION}"
          elif [ "${status}" = "stopped" ]; then
            echo "${DB_ID} is already stopped."
          else
            echo "${DB_ID} is ${status}; skipping stop."
          fi
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}

      - name: Start Dev database for test profile
        if: env.DEV_PROFILE != 'idle'
        run: |
          set -euo pipefail
          DB_ID="${STACK_PREFIX}-postgres-public"
          status="$(aws rds describe-db-instances --db-instance-identifier "${DB_ID}" --region "${AWS_REGION}" --query "DBInstances[0].DBInstanceStatus" --output text 2>/dev/null || true)"
          if [ "${status}" = "stopped" ]; then
            aws rds start-db-instance --db-instance-identifier "${DB_ID}" --region "${AWS_REGION}"
            aws rds wait db-instance-available --db-instance-identifier "${DB_ID}" --region "${AWS_REGION}"
          elif [ "${status}" = "available" ]; then
            echo "${DB_ID} is already available."
          elif [ -z "${status}" ]; then
            echo "${DB_ID} does not exist yet; CDK deploy will create it."
          else
            echo "${DB_ID} is ${status}; waiting for available."
            aws rds wait db-instance-available --db-instance-identifier "${DB_ID}" --region "${AWS_REGION}"
          fi
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}

      - name: Deploy Dev base stacks
        if: env.DEV_PROFILE != 'idle'
        run: >
          npx cdk deploy
          ${STACK_PREFIX}-auth-stack
          ${STACK_PREFIX}-data-stack
          ${STACK_PREFIX}-storage-stack
          -c stage=dev
          -c devProfile=${DEV_PROFILE}
          --require-approval never
        working-directory: infra
        env:
          DEV_PUBLIC_BASE_URL: ${{ vars.DEV_PUBLIC_BASE_URL }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

      - name: Run Dev database migrations
        if: env.DEV_PROFILE != 'idle'
        run: node scripts/run-stack-db-migrations.js
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}

      - name: Seed Dev current event
        if: env.DEV_PROFILE != 'idle'
        run: |
          set -euo pipefail
          SECRET_ARN="$(aws cloudformation describe-stacks --stack-name "${STACK_PREFIX}-data-stack" --region "${AWS_REGION}" --query "Stacks[0].Outputs[?OutputKey=='DbSecretArn'].OutputValue" --output text)"
          SEED_DB_SECRET_ARN="${SECRET_ARN}" npm --workspace api run seed:dev-current-event
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          STAGE: dev
          DB_SSL: "true"
          DB_SSL_REJECT_UNAUTHORIZED: "true"

      - name: Deploy Dev API stack
        if: env.DEV_PROFILE != 'idle'
        run: >
          npx cdk deploy
          ${STACK_PREFIX}-api-stack
          -c stage=dev
          -c devProfile=${DEV_PROFILE}
          --require-approval never
        working-directory: infra
        env:
          DEV_PUBLIC_BASE_URL: ${{ vars.DEV_PUBLIC_BASE_URL }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

  deploy_prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - validate_prod
    runs-on: ubuntu-latest
    environment: prod
    env:
      STACK_PREFIX: dreiecksrennen-prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate Prod environment configuration
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}" ]; then
            echo "AWS_DEPLOY_ROLE_ARN_PROD is missing in GitHub Environment 'prod'."
            exit 1
          fi
          if [ -z "${{ vars.AWS_ACCOUNT_ID }}" ]; then
            echo "AWS_ACCOUNT_ID is missing in GitHub Environment 'prod'."
            exit 1
          fi
          if [ -z "${{ vars.AWS_REGION }}" ]; then
            echo "AWS_REGION is missing in GitHub Environment 'prod'."
            exit 1
          fi
          if [ -z "${{ vars.PROD_PUBLIC_BASE_URL }}" ]; then
            echo "PROD_PUBLIC_BASE_URL is missing in GitHub Environment 'prod'."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Prod base stacks
        run: >
          npx cdk deploy
          ${STACK_PREFIX}-auth-stack
          ${STACK_PREFIX}-data-stack
          ${STACK_PREFIX}-storage-stack
          -c stage=prod
          --require-approval never
        working-directory: infra
        env:
          PROD_PUBLIC_BASE_URL: ${{ vars.PROD_PUBLIC_BASE_URL }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

      - name: Run Prod database migrations
        run: node scripts/run-stack-db-migrations.js
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}

      - name: Deploy Prod API stack
        run: >
          npx cdk deploy
          ${STACK_PREFIX}-api-stack
          -c stage=prod
          --require-approval never
        working-directory: infra
        env:
          PROD_PUBLIC_BASE_URL: ${{ vars.PROD_PUBLIC_BASE_URL }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
