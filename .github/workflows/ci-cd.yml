name: Backend CI/CD

on:
  pull_request:
    branches:
      - dev
      - main
  push:
    branches:
      - dev
      - main
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:
    inputs:
      dev_profile:
        description: "Dev deploy profile"
        required: true
        default: "test"
        type: choice
        options:
          - idle
          - test

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: API tests
        run: npm --workspace api test

      - name: Infra build
        run: npm --workspace infra run build

      - name: CDK synth (dev)
        if: github.base_ref == 'dev' || github.ref == 'refs/heads/dev'
        run: npm --workspace infra run synth -- -c stage=dev -c devProfile=test
        env:
          DEV_PUBLIC_BASE_URL: ${{ vars.DEV_PUBLIC_BASE_URL }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

      - name: CDK synth (prod)
        if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
        run: npm --workspace infra run synth -- -c stage=prod
        env:
          PROD_PUBLIC_BASE_URL: ${{ vars.PROD_PUBLIC_BASE_URL }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

  deploy_dev:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/dev') ||
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'schedule')
    needs: validate
    runs-on: ubuntu-latest
    environment: dev
    env:
      DEV_PROFILE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dev_profile || github.event_name == 'push' && 'test' || 'idle' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate Dev environment configuration
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}" ]; then
            echo "AWS_DEPLOY_ROLE_ARN_DEV is missing in GitHub Environment 'dev'."
            exit 1
          fi
          if [ -z "${{ vars.AWS_ACCOUNT_ID }}" ]; then
            echo "AWS_ACCOUNT_ID is missing in GitHub Environment 'dev'."
            exit 1
          fi
          if [ -z "${{ vars.AWS_REGION }}" ]; then
            echo "AWS_REGION is missing in GitHub Environment 'dev'."
            exit 1
          fi
          if [ -z "${{ vars.DEV_PUBLIC_BASE_URL }}" ]; then
            echo "DEV_PUBLIC_BASE_URL is missing in GitHub Environment 'dev'."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_DEV }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Dev stacks
        run: npx cdk deploy --all -c stage=dev -c devProfile=${DEV_PROFILE} --require-approval never
        working-directory: infra
        env:
          DEV_PUBLIC_BASE_URL: ${{ vars.DEV_PUBLIC_BASE_URL }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}

  deploy_prod:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate Prod environment configuration
        run: |
          if [ -z "${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}" ]; then
            echo "AWS_DEPLOY_ROLE_ARN_PROD is missing in GitHub Environment 'prod'."
            exit 1
          fi
          if [ -z "${{ vars.AWS_ACCOUNT_ID }}" ]; then
            echo "AWS_ACCOUNT_ID is missing in GitHub Environment 'prod'."
            exit 1
          fi
          if [ -z "${{ vars.AWS_REGION }}" ]; then
            echo "AWS_REGION is missing in GitHub Environment 'prod'."
            exit 1
          fi
          if [ -z "${{ vars.PROD_PUBLIC_BASE_URL }}" ]; then
            echo "PROD_PUBLIC_BASE_URL is missing in GitHub Environment 'prod'."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN_PROD }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Prod stacks
        run: npx cdk deploy --all -c stage=prod --require-approval never
        working-directory: infra
        env:
          PROD_PUBLIC_BASE_URL: ${{ vars.PROD_PUBLIC_BASE_URL }}
          CDK_DEFAULT_ACCOUNT: ${{ vars.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ vars.AWS_REGION }}
